#####################################################################
#   Fan Control and temperatures
#####################################################################

[fan_generic filter] #Nevermore Filter
pin: PD13
max_power: 1.0
kick_start_time: 0.250
off_below: 0.10

[controller_fan electronics_fan] #Fan for the electronic cabinet
pin: PA8
max_power: .8
kick_start_time: 0.5
fan_speed: 0.40
idle_timeout: 300
idle_speed: 0.2
stepper: stepper_x

[temperature_sensor Chamber]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PF4

[temperature_sensor Toolhead]
sensor_type: temperature_mcu
sensor_mcu: ebb36_0

[temperature_sensor Octopus]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Raspberry]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_fan RPi Cooling]
pin: PE5
max_power: 0.8
hardware_pwm: true
kick_start_time: 0.250
off_below: 0.2
sensor_type: temperature_host
min_temp: 0
max_temp: 100
control: pid
pid_Kp: 2.0
pid_Ki: 5.0
pid_Kd: 0.5
min_speed: 0.3
max_speed: 0.7
target_temp: 50